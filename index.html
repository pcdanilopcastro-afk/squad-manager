<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Manager - Gestao Operacional & Financeira</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --sidebar-w: 260px;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-2: #f8f9fa;
            --border: #e2e8f0;
            --text: #1a202c;
            --text-2: #64748b;
            --text-3: #94a3b8;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #dbeafe;
            --green: #22c55e;
            --green-bg: #dcfce7;
            --green-text: #166534;
            --yellow: #eab308;
            --yellow-bg: #fef9c3;
            --yellow-text: #854d0e;
            --red: #ef4444;
            --red-bg: #fee2e2;
            --red-text: #991b1b;
            --sidebar-bg: #0f172a;
            --sidebar-text: #cbd5e1;
            --sidebar-hover: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        /* Login */
        .login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-screen.hidden { display: none; }
        .login-box { background: var(--surface); border-radius: 20px; padding: 48px 40px; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-box .login-icon { width: 64px; height: 64px; background: var(--primary-light); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
        .login-box .login-icon svg { width: 32px; height: 32px; stroke: var(--primary); }
        .login-box h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .login-box p { font-size: 14px; color: var(--text-2); margin-bottom: 32px; }
        .login-box .login-input { width: 100%; padding: 14px 18px; border: 2px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 15px; outline: none; transition: border-color 0.2s; margin-bottom: 16px; }
        .login-box .login-input:focus { border-color: var(--primary); }
        .login-box .login-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .login-box .login-btn:hover { background: var(--primary-dark); }
        .login-box .login-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 20px; }
        .login-box .login-footer { margin-top: 24px; font-size: 11px; color: var(--text-3); }

        /* Sidebar */
        .sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); color: var(--sidebar-text); position: fixed; top: 0; left: 0; bottom: 0; display: flex; flex-direction: column; z-index: 100; overflow-y: auto; }
        .sidebar-brand { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .sidebar-brand h1 { font-size: 18px; font-weight: 700; color: #fff; }
        .sidebar-brand p { font-size: 11px; color: var(--text-3); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
        .sidebar-nav { padding: 16px 12px; flex: 1; }
        .nav-section { margin-bottom: 24px; }
        .nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-3); padding: 0 8px; margin-bottom: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; font-size: 14px; color: var(--sidebar-text); margin-bottom: 2px; }
        .nav-item:hover { background: var(--sidebar-hover); }
        .nav-item.active { background: var(--primary); color: #fff; }
        .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
        .nav-item .badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600; }

        /* Main */
        .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }
        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
        .topbar h2 { font-size: 20px; font-weight: 700; }
        .topbar-actions { display: flex; gap: 12px; align-items: center; }
        .content { padding: 32px; }

        /* Month Selector */
        .month-selector { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 6px 8px; }
        .month-selector button { background: none; border: none; cursor: pointer; padding: 6px 8px; border-radius: 6px; color: var(--text-2); font-size: 16px; transition: all 0.15s; display: flex; align-items: center; }
        .month-selector button:hover { background: var(--surface-2); color: var(--text); }
        .month-selector .current-month { font-size: 14px; font-weight: 600; min-width: 120px; text-align: center; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: var(--surface); border-radius: 12px; padding: 24px; border: 1px solid var(--border); }
        .stat-card .label { font-size: 12px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card .change { font-size: 12px; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
        .stat-card .change.positive { color: var(--green-text); }
        .stat-card .change.negative { color: var(--red-text); }

        /* Tables */
        .table-container { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
        .table-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .table-header h3 { font-size: 16px; font-weight: 600; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th { background: var(--surface-2); padding: 10px 14px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); border-bottom: 1px solid var(--border); white-space: nowrap; }
        thead th.r { text-align: right; }
        thead th.c { text-align: center; }
        tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
        tbody td.r { text-align: right; }
        tbody td.c { text-align: center; }
        tbody tr:hover { background: var(--surface-2); }
        tbody tr.total-row { background: var(--surface-2); font-weight: 700; }
        tbody tr.total-row td { border-top: 2px solid var(--border); }
        tbody tr.pct-row { background: var(--surface-2); }
        tbody tr.pct-row td { font-size: 11px; color: var(--text-2); }

        /* Editable */
        .editable { cursor: text; min-width: 55px; }
        .editable:hover { background: var(--primary-light); border-radius: 4px; }
        .editable input { width: 70px; padding: 4px 8px; border: 2px solid var(--primary); border-radius: 4px; font-family: inherit; font-size: 13px; text-align: right; outline: none; }
        .editable.wide input { width: 110px; }

        /* Badges */
        .badge-margin { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-margin.green { background: var(--green-bg); color: var(--green-text); }
        .badge-margin.yellow { background: var(--yellow-bg); color: var(--yellow-text); }
        .badge-margin.red { background: var(--red-bg); color: var(--red-text); }

        .badge-status { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-status.active { background: var(--green-bg); color: var(--green-text); }
        .badge-status.cancelled { background: var(--red-bg); color: var(--red-text); }

        /* Deviation indicators */
        .dev-positive { color: var(--red-text); font-weight: 600; }
        .dev-negative { color: var(--green-text); font-weight: 600; }
        .dev-zero { color: var(--text-3); }

        /* Capacity */
        .capacity-bar-container { display: flex; align-items: center; gap: 12px; }
        .capacity-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .capacity-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .capacity-bar-fill.green { background: var(--green); }
        .capacity-bar-fill.yellow { background: var(--yellow); }
        .capacity-bar-fill.red { background: var(--red); }
        .capacity-label { font-size: 12px; font-weight: 600; min-width: 45px; text-align: right; }

        /* Buttons */
        .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; }
        .btn:hover { background: var(--surface-2); }
        .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-danger { color: var(--red); border-color: var(--red); }
        .btn-danger:hover { background: var(--red-bg); }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        /* Alerts - dismissible */
        .alerts-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
        .alert-item { padding: 12px 16px; border-radius: 10px; display: flex; align-items: center; gap: 12px; font-size: 13px; position: relative; }
        .alert-item.warning { background: var(--yellow-bg); color: var(--yellow-text); border: 1px solid #fde68a; }
        .alert-item.danger { background: var(--red-bg); color: var(--red-text); border: 1px solid #fecaca; }
        .alert-item.info { background: var(--primary-light); color: var(--primary-dark); border: 1px solid #93c5fd; }
        .alert-dismiss { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.5; transition: opacity 0.15s; padding: 4px 8px; line-height: 1; color: inherit; }
        .alert-dismiss:hover { opacity: 1; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--surface); border-radius: 16px; padding: 32px; width: 90%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
        .modal h3 { font-size: 18px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.15s; }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }

        /* Tabs */
        .squad-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .squad-tab { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
        .squad-tab:hover { border-color: var(--primary); color: var(--primary); }
        .squad-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Info bar */
        .info-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .info-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; min-width: 160px; }
        .info-item .label { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; }
        .info-item .value { font-size: 22px; font-weight: 700; margin-top: 4px; }

        /* Members */
        .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .member-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 12px; }
        .member-chip .role { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; }
        .member-chip .name { font-weight: 600; margin-top: 2px; }
        .member-chip .cost { color: var(--text-2); margin-top: 2px; }

        /* Dashboard grid */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .dashboard-grid .full-width { grid-column: 1 / -1; }

        /* View pages */
        .view-page { display: none; }
        .view-page.active { display: block; }

        /* Toast */
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--sidebar-bg); color: #fff; padding: 14px 24px; border-radius: 10px; font-size: 13px; z-index: 2000; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { width: 60px; }
            .sidebar .sidebar-brand p, .sidebar .nav-section-title, .sidebar .nav-item span, .sidebar .nav-item .badge { display: none; }
            .sidebar .nav-item { justify-content: center; padding: 12px; }
            .main { margin-left: 60px; }
            .content { padding: 20px; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        /* Comparison row */
        .comparison-row { font-size: 11px; color: var(--text-3); font-style: italic; }
        .comparison-row td { padding: 4px 14px !important; border-bottom: 1px dashed var(--border) !important; }

        /* Onboarding card */
        .onboarding-card { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; border-radius: 14px; padding: 28px 32px; margin-bottom: 24px; display: flex; align-items: center; gap: 24px; box-shadow: 0 4px 16px rgba(59,130,246,0.15); }
        .onboarding-card .onb-icon { width: 56px; height: 56px; background: rgba(255,255,255,0.15); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .onboarding-card .onb-icon svg { width: 28px; height: 28px; stroke: #fff; }
        .onboarding-card .onb-body { flex: 1; }
        .onboarding-card .onb-step { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }
        .onboarding-card .onb-title { font-size: 18px; font-weight: 700; margin-top: 4px; }
        .onboarding-card .onb-desc { font-size: 13px; opacity: 0.9; margin-top: 4px; }
        .onboarding-card .onb-cta { background: #fff; color: var(--primary-dark); padding: 10px 20px; border-radius: 8px; border: none; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .onboarding-card .onb-cta:hover { background: var(--primary-light); }

        /* Section divider (inside unified squad view) */
        .section-divider { margin: 32px 0 20px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .section-divider .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-2); }

        /* Collapsible details */
        details.collapsible { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; overflow: hidden; }
        details.collapsible summary { padding: 18px 24px; cursor: pointer; font-weight: 600; font-size: 15px; display: flex; justify-content: space-between; align-items: center; list-style: none; user-select: none; }
        details.collapsible summary::-webkit-details-marker { display: none; }
        details.collapsible summary::after { content: '+'; font-size: 20px; color: var(--text-2); }
        details.collapsible[open] summary::after { content: '−'; }
        details.collapsible summary:hover { background: var(--surface-2); }
        details.collapsible .collapsible-body { border-top: 1px solid var(--border); }

        /* Sticky thead for Registro Diario */
        .sticky-head thead th { position: sticky; top: 0; z-index: 2; }

        /* Empty state */
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-2); }
        .empty-state .empty-icon { width: 56px; height: 56px; margin: 0 auto 16px; background: var(--surface-2); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .empty-state .empty-icon svg { width: 28px; height: 28px; stroke: var(--text-3); }
        .empty-state .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .empty-state .empty-desc { font-size: 13px; margin-bottom: 16px; }

        /* Search/filter input */
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filter-bar input[type="search"], .filter-bar select { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 13px; outline: none; background: var(--surface); }
        .filter-bar input[type="search"]:focus, .filter-bar select:focus { border-color: var(--primary); }
        .filter-bar input[type="search"] { min-width: 240px; }

        /* Hide month selector on non-temporal views */
        body.no-month #month-selector { display: none; }
    </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
    <div class="login-box">
        <div class="login-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <h2>Squad Manager</h2>
        <p>Acesso restrito. Digite a senha para continuar.</p>
        <form onsubmit="attemptLogin(event)">
            <input type="password" class="login-input" id="login-password" placeholder="Senha de acesso" autofocus>
            <button type="submit" class="login-btn">Entrar</button>
        </form>
        <div class="login-error" id="login-error"></div>
        <div class="login-footer">Acesso protegido por senha</div>
    </div>
</div>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>SquadManager</h1>
        <p>Gestao Operacional</p>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">
            <div class="nav-section-title">Operar</div>
            <div class="nav-item active" onclick="showView('dashboard')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
                <span class="badge" id="sidebar-alert-badge" style="display:none"></span>
            </div>
            <div class="nav-item" onclick="showView('timeentry')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>Registro Diario</span>
            </div>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">Gerenciar</div>
            <div class="nav-item" onclick="showView('squads')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                <span>Squads</span>
            </div>
            <div class="nav-item" onclick="showView('clients')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Clientes</span>
            </div>
            <div class="nav-item" onclick="showView('team')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                <span>Equipe</span>
            </div>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">Configurar</div>
            <div class="nav-item" onclick="showView('settings')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Configuracoes</span>
            </div>
        </div>
    </nav>
</aside>

<!-- Main -->
<div class="main">
    <div class="topbar">
        <h2 id="page-title">Dashboard</h2>
        <div class="topbar-actions">
            <div class="month-selector" id="month-selector">

<script>
// ==================== CONSTANTS ====================
const ROLES = ['Account','GT','Copy/SM','Designer','Web Designer','Coordenador'];
const SENIORITY = ['','Junior','Pleno','Senior'];
const HOURS_BASE = 180; // horas mensais para calculo custo/hora
const MONTHS_PT = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const STATUS_LABELS = { active: 'Ativo', cancelled: 'Cancelado' };
const NON_TEMPORAL_VIEWS = new Set(['clients', 'team', 'settings']);

// ==================== STATE ====================
let DATA;
let currentView = 'dashboard';
let selectedSquadId = null;
let selectedMonth; // "2026-04"
let editingCell = null;
let dismissedAlerts = new Set();

function initMonth() {
    const now = new Date();
    selectedMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
}

function monthKey() { return selectedMonth; }
function monthLabel() {
    const [y,m] = selectedMonth.split('-').map(Number);
    return `${MONTHS_PT[m-1]} ${y}`;
}

function prevMonthKey() {
    const [y,m] = selectedMonth.split('-').map(Number);
    const pm = m === 1 ? 12 : m - 1;
    const py = m === 1 ? y - 1 : y;
    return `${py}-${String(pm).padStart(2,'0')}`;
}

function changeMonth(dir) {
    const [y,m] = selectedMonth.split('-').map(Number);
    let nm = m + dir, ny = y;
    if (nm > 12) { nm = 1; ny++; }
    if (nm < 1) { nm = 12; ny--; }
    selectedMonth = `${ny}-${String(nm).padStart(2,'0')}`;
    dismissedAlerts.clear();
    render();
}

// ==================== DATA ====================
function emptyHours() {
    const h = {};
    ROLES.forEach(r => h[r] = 0);
    return h;
}

function getDefaultData() {
    const month = monthKey();
    return {
        squads: [
            {
                id: 1, name: 'Squad 1', capacity: 180,
                members: [
                    { role: 'Account', name: 'Murillo', costPerHour: 30.54 },
                    { role: 'GT', name: 'Conrado D.', costPerHour: 15.56 },
                    { role: 'Copy/SM', name: 'Paula', costPerHour: 31.78 },

                ]
            },
            {
                id: 2, name: 'Squad 2', capacity: 180,
                members: [
                    { role: 'Account', name: 'Lucas', costPerHour: 30.54 },
                    { role: 'GT', name: 'Fernando', costPerHour: 19.44 },
                    { role: 'Copy/SM', name: 'Eduarda', costPerHour: 22.89 },
                    { role: 'Designer', name: 'Wagner', costPerHour: 36.04 },
                    { role: 'Web Designer', name: 'Fernando', costPerHour: 19.44 },
                    { role: 'Coordenador', name: 'Murilo', costPerHour: 66.67 }
                ]
            }
        ],
        clients: [
            { id:1, squadId:1, name:'OMX', fee:1670, status:'active', planned:{ 'Account':0.17,'GT':0,'Copy/SM':2.3,'Designer':12.6,'Web Designer':0,'Coordenador':0 } },

            { id:7, squadId:2, name:'Pontarollo', fee:790, status:'active', planned:{ 'Account':1.35,'GT':0,'Copy/SM':4.68,'Designer':22.08,'Web Designer':0,'Coordenador':0 } },
            { id:8, squadId:2, name:'Aeroclube', fee:3280, status:'active', planned:{ 'Account':1.28,'GT':10,'Copy/SM':6.6,'Designer':12.12,'Web Designer':0,'Coordenador':10 } },
            { id:9, squadId:2, name:'Instituto Blum', fee:3900, status:'active', planned:{ 'Account':0,'GT':10,'Copy/SM':4.53,'Designer':5.9,'Web Designer':0,'Coordenador':10 } },
            { id:10, squadId:2, name:'Life Premium', fee:4200, status:'active', planned:{ 'Account':6.62,'GT':0,'Copy/SM':6.95,'Designer':14.88,'Web Designer':0,'Coordenador':0 } },
            { id:11, squadId:2, name:'Kelma', fee:3500, status:'active', planned:{ 'Account':2.35,'GT':10,'Copy/SM':11.7,'Designer':27.25,'Web Designer':0,'Coordenador':10 } },
            { id:12, squadId:2, name:'Cemiterio Parque Jardim', fee:6130, status:'active', planned:{ 'Account':0.08,'GT':10,'Copy/SM':2.33,'Designer':7.98,'Web Designer':0,'Coordenador':10 } },
            { id:13, squadId:2, name:'Retibom', fee:4225, status:'active', planned:{ 'Account':1.72,'GT':7.5,'Copy/SM':6.98,'Designer':11.4,'Web Designer':0,'Coordenador':7.5 } },
            { id:14, squadId:2, name:'Costa Ferro', fee:5062, status:'active', planned:{ 'Account':0.45,'GT':12.5,'Copy/SM':0.3,'Designer':2.6,'Web Designer':0,'Coordenador':12.5 } }
        ],
        // Team: employee registry
        team: [
            { id:1, name:'Danilo', role:'Coordenador', seniority:'', salary:12000 },

            { id:5, name:'Lucas Piemontez Bueno', role:'Account', seniority:'Senior', salary:5497.87 },
            { id:6, name:'Eduarda Rumblsperger Guimaraes D\'Oliveira', role:'Copy/SM', seniority:'Junior', salary:4119.50 },
            { id:7, name:'Paula Schamne', role:'Copy/SM', seniority:'Senior', salary:5720.77 },
            { id:8, name:'Fernando Melo Lopes de Oliveira', role:'GT', seniority:'Pleno', salary:3500 },
            { id:9, name:'Conrado Fabricio Ducheiko Araujo', role:'GT', seniority:'Pleno', salary:2800 },
            { id:10, name:'Bernardo de Souza Godoy', role:'Closer', seniority:'Junior', salary:3500 },
            { id:11, name:'Rodrigo Armando Vieira', role:'Designer', seniority:'Pleno', salary:8000 },
            { id:12, name:'Wagner Felipe Zeiyn Marques', role:'Designer', seniority:'Pleno', salary:6486.78 },
            { id:13, name:'Leandro Steel Baltazar', role:'Designer', seniority:'Pleno', salary:6975 },
            { id:14, name:'Conrado Rocha Cuccia', role:'Web Designer', seniority:'Pleno', salary:3500 },
            { id:15, name:'Vanusa Fragoso', role:'Analista financeiro', seniority:'Pleno', salary:5279.50 }
        ],
        nextTeamId: 16,
        // Monthly actual hours: { "2026-04": { clientId: { role: hours } } }
        actuals: {},
        nextClientId: 15,
        nextSquadId: 3,
        healthyMargin: 0.5
    };
}

function loadData() {
    const saved = localStorage.getItem('squad-manager-data-v2');
    DATA = saved ? JSON.parse(saved) : getDefaultData();
    if (!DATA.actuals) DATA.actuals = {};
    if (!DATA.team) { DATA.team = getDefaultData().team; DATA.nextTeamId = 16; saveData(); }
    if (DATA.healthyMargin === undefined) DATA.healthyMargin = 0.5;
}

function getTeamMember(name) {
    return DATA.team.find(t => t.name === name);
}

function teamCostPerHour(member) {
    return member && member.salary > 0 ? member.salary / HOURS_BASE : 0;
}

function getTeamTotalSalary() {
    return DATA.team.reduce((s, t) => s + (t.salary || 0), 0);
}

function saveData() {
    localStorage.setItem('squad-manager-data-v2', JSON.stringify(DATA));
}

// ==================== CALCULATIONS ====================
function getCost(squadId, role) {
    const sq = DATA.squads.find(s => s.id === squadId);
    const m = sq?.members.find(x => x.role === role);
    if (!m) return 0;
    // Try to get cost from team registry (salary / 180)
    const teamMember = getTeamMember(m.name);
    if (teamMember && teamMember.salary > 0) return teamCostPerHour(teamMember);
    // Fallback to squad-defined cost
    return m.costPerHour || 0;
}

function getPlanned(client, role) { return client.planned[role] || 0; }

function getActual(client, role, month) {
    month = month || monthKey();
    return DATA.actuals[month]?.[client.id]?.[role] || 0;
}

function setActual(clientId, role, val) {
    const mk = monthKey();
    if (!DATA.actuals[mk]) DATA.actuals[mk] = {};
    if (!DATA.actuals[mk][clientId]) DATA.actuals[mk][clientId] = {};
    DATA.actuals[mk][clientId][role] = val;
    saveData();
}

function hasActuals(client, month) {
    month = month || monthKey();
    const a = DATA.actuals[month]?.[client.id];
    if (!a) return false;
    return ROLES.some(r => (a[r] || 0) > 0);
}

function getHours(client, role, month) {
    // If actuals exist for this client+month, use actual; else use planned
    month = month || monthKey();
    if (hasActuals(client, month)) return getActual(client, role, month);
    return getPlanned(client, role);
}

function clientTotalPlanned(c) { return ROLES.reduce((s,r) => s + getPlanned(c,r), 0); }
function clientTotalActual(c, month) { return ROLES.reduce((s,r) => s + getActual(c,r,month), 0); }
function clientTotalHours(c, month) { return ROLES.reduce((s,r) => s + getHours(c,r,month), 0); }

function clientCSPByRole(c, role, month) { return getHours(c, role, month) * getCost(c.squadId, role); }
function clientCSP(c, month) { return ROLES.reduce((s,r) => s + clientCSPByRole(c,r,month), 0); }
function clientMargin(c, month) { return c.fee > 0 ? (c.fee - clientCSP(c,month)) / c.fee : 0; }
function marginClass(m) { const h = DATA.healthyMargin; return m >= h ? 'green' : m >= h * 0.6 ? 'yellow' : 'red'; }

function deviation(client, role) {
    const mk = monthKey();
    if (!hasActuals(client, mk)) return 0;
    return getActual(client, role, mk) - getPlanned(client, role);
}

function totalDeviation(client) {
    const mk = monthKey();
    if (!hasActuals(client, mk)) return 0;
    return clientTotalActual(client, mk) - clientTotalPlanned(client);
}

function squadClients(sqId) { return DATA.clients.filter(c => c.squadId === sqId && c.status !== 'cancelled'); }
function squadTotalByRole(sqId, role, month) { return squadClients(sqId).reduce((s,c) => s + getHours(c,role,month), 0); }
function squadTotalHours(sqId, month) { return squadClients(sqId).reduce((s,c) => s + clientTotalHours(c,month), 0); }
function squadCapacity(sqId) {
    const sq = DATA.squads.find(s=>s.id===sqId);
    if (!sq) return 0;
    const activeMembers = sq.members.filter(m => m.name && m.name.trim() !== '').length;
    return activeMembers * (sq.capacity || HOURS_BASE); // capacity = horas por pessoa (default 180)
}
function squadUtil(sqId, month) { const cap = squadCapacity(sqId); return cap > 0 ? squadTotalHours(sqId,month)/cap : 0; }
function squadFee(sqId) { return squadClients(sqId).reduce((s,c) => s + c.fee, 0); }
function squadCSP(sqId, month) { return squadClients(sqId).reduce((s,c) => s + clientCSP(c,month), 0); }
function squadTotalSalary(sqId) {
    const sq = DATA.squads.find(s => s.id === sqId);
    if (!sq) return 0;
    return sq.members.filter(m => m.name && m.name.trim()).reduce((s, m) => {
        const tm = getTeamMember(m.name);
        return s + (tm ? (tm.salary || 0) : 0);
    }, 0);
}


function getAllAlerts() {
    const alerts = [];
    DATA.squads.forEach(sq => {
        const u = squadUtil(sq.id);
        if (u > 1) alerts.push({ id: `sq-over-${sq.id}`, type:'danger', msg:`${sq.name} esta SOBRECARREGADO (${fmt.pct(u)})` });
        else if (u > 0.85) alerts.push({ id:`sq-high-${sq.id}`, type:'warning', msg:`${sq.name} esta com alta ocupacao (${fmt.pct(u)})` });
    });
    DATA.clients.forEach(c => {
        if (c.status === 'cancelled') return;
        const m = clientMargin(c);
        if (m < 0) alerts.push({ id:`cl-neg-${c.id}`, type:'danger', msg:`${c.name} tem margem NEGATIVA (${fmt.pct(m)})` });
        else if (m < DATA.healthyMargin && c.fee > 0) alerts.push({ id:`cl-low-${c.id}`, type:'warning', msg:`${c.name} esta abaixo da margem saudavel de ${fmt.pct(DATA.healthyMargin)} (atual: ${fmt.pct(m)})` });
        const dev = totalDeviation(c);
        if (dev > 5) alerts.push({ id:`cl-dev-${c.id}`, type:'warning', msg:`${c.name} consumiu ${fmt.hrs(dev)}h a mais que o planejado` });
    });
    return alerts.filter(a => !dismissedAlerts.has(a.id));
}

// ==================== FORMATTERS ====================
const fmt = {
    brl: v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}),
    pct: v => (v*100).toFixed(1)+'%',
    num: v => typeof v==='number' ? (Number.isInteger(v)?v.toString():v.toFixed(2)) : '0',
    hrs: v => v.toFixed(2),
    monthShort: mk => { const [y,m]=mk.split('-').map(Number); return MONTHS_PT[m-1].slice(0,3)+'/'+y; }
};

function devHtml(val, planned) {
    if (Math.abs(val) < 0.01) return '<span class="dev-zero">-</span>';
    const sign = val > 0 ? '+' : '';
    // Relative tolerance: +-10% of planned is neutral (within expected variation)
    const tol = planned !== undefined && planned > 0 ? planned * 0.1 : 1;
    let cls;
    if (Math.abs(val) < tol) cls = 'dev-zero';
    else if (val > 0) cls = 'dev-positive';
    else cls = 'dev-negative';
    return `<span class="${cls}">${sign}${fmt.hrs(val)}</span>`;
}

// ==================== RENDERING ====================
function showView(view) {
    currentView = view;
    document.querySelectorAll('.view-page').forEach(p => p.classList.remove('active'));
    document.getElementById(`view-${view}`).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const idx = ['dashboard','timeentry','squads','clients','team','settings'].indexOf(view);
    document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
    const titles = {dashboard:'Dashboard',timeentry:'Registro Diario',squads:'Squads',clients:'Clientes',team:'Equipe',settings:'Configuracoes'};
    document.getElementById('page-title').textContent = titles[view];
    document.body.classList.toggle('no-month', NON_TEMPORAL_VIEWS.has(view));
    if (!selectedSquadId && DATA.squads.length) selectedSquadId = DATA.squads[0].id;
    render();
}

function render() {
    document.getElementById('month-label').textContent = monthLabel();
    updateSidebarBadge();
    // Context actions per view
    const ctx = document.getElementById('topbar-context-actions');
    const actions = {
        dashboard: '',
        timeentry: '',
        squads: '<button class="btn btn-primary" onclick="openModal(\'add-client\')">+ Novo Cliente</button>',
        clients: '<button class="btn btn-primary" onclick="openModal(\'add-client\')">+ Novo Cliente</button><button class="btn" onclick="exportData()">Exportar CSV</button>',
        team: '<button class="btn btn-primary" onclick="openModal(\'add-team\')">+ Novo Colaborador</button>',
        settings: '<button class="btn btn-primary" onclick="openModal(\'add-squad\')">+ Novo Squad</button>'
    };
    ctx.innerHTML = actions[currentView] || '';
    switch(currentView) {
        case 'dashboard': renderDashboard(); break;
        case 'timeentry': renderTimeEntry(); break;
        case 'squads': renderSquads(); break;
        case 'clients': renderClients(); break;
        case 'team': renderTeam(); break;
        case 'settings': renderSettings(); break;
    }
}

function updateSidebarBadge() {
    const badge = document.getElementById('sidebar-alert-badge');
    if (!badge) return;
    const count = getAllAlerts().length;
    if (count > 0) { badge.style.display = ''; badge.textContent = count; }
    else { badge.style.display = 'none'; }
}

// ---------- DASHBOARD ----------
// ---------- TIME ENTRY ----------
let timeEntryFilter = { squad: 'all', search: '' };
function renderTimeEntry() {
    // Empty state - no clients yet
    const activeClients = DATA.clients.filter(c => c.status !== 'cancelled');
    if (!activeClients.length) {
        document.getElementById('timeentry-content').innerHTML = emptyStateHtml({
            title: 'Nenhum cliente ativo',
            desc: 'Cadastre clientes antes de lancar horas.',
            cta: 'Ir para Clientes',
            action: "showView('clients')"
        });
        return;
    }

    const mk = monthKey();
    const q = timeEntryFilter.search.toLowerCase().trim();

    let html = `
        <div style="margin-bottom:20px;padding:16px 20px;background:var(--primary-light);border-radius:10px;font-size:14px;color:var(--primary-dark)">
            <strong>Lancamento rapido</strong> &middot; Preencha as horas reais de <strong>${monthLabel()}</strong>. Salva automaticamente ao sair do campo.
        </div>
        <div class="filter-bar">
            <input type="search" placeholder="Buscar cliente..." value="${timeEntryFilter.search}" oninput="timeEntryFilter.search=this.value;renderTimeEntry()">
            <select onchange="timeEntryFilter.squad=this.value;renderTimeEntry()">
                <option value="all" ${timeEntryFilter.squad==='all'?'selected':''}>Todos os squads</option>
                ${DATA.squads.map(sq=>`<option value="${sq.id}" ${timeEntryFilter.squad==String(sq.id)?'selected':''}>${sq.name}</option>`).join('')}
            </select>
        </div>
    `;

    const squadsToShow = timeEntryFilter.squad === 'all' ? DATA.squads : DATA.squads.filter(s => String(s.id) === timeEntryFilter.squad);
    let anyRendered = false;

    squadsToShow.forEach(sq => {
        const cls = squadClients(sq.id).filter(c => !q || c.name.toLowerCase().includes(q));
        if (!cls.length) return;
        anyRendered = true;
        const cap = squadCapacity(sq.id);
        const used = squadTotalHours(sq.id, mk);
        const u = cap > 0 ? used / cap : 0;
        const bc = u > 1 ? 'red' : u > 0.85 ? 'yellow' : 'green';

        html += `
        <div class="table-container">
            <div class="table-header">
                <h3>${sq.name}</h3>
                <div style="display:flex;align-items:center;gap:16px">
                    <span style="font-size:13px;color:var(--text-2)">${fmt.hrs(used)}h / ${cap}h usadas</span>
                    <div class="capacity-bar-container" style="width:120px">
                        <div class="capacity-bar"><div class="capacity-bar-fill ${bc}" style="width:${Math.min(u*100,100)}%"></div></div>
                        <span class="capacity-label">${fmt.pct(u)}</span>
                    </div>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="sticky-head">
                    <thead>
                        <tr>
                            <th style="min-width:160px">Cliente</th>
                            ${ROLES.map(r => '<th class="r" style="min-width:90px">' + r + '</th>').join('')}
                            <th class="r">Total</th>
                            <th class="r">Planejado</th>
                            <th class="r">Desvio</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${cls.map(c => {
                            const planned = clientTotalPlanned(c);
                            const actual = clientTotalActual(c, mk);
                            const hasAct = hasActuals(c, mk);
                            const dev = hasAct ? actual - planned : 0;
                            return '<tr>' +
                                '<td><strong>' + c.name + '</strong></td>' +
                                ROLES.map(r => {
                                    const val = getActual(c, r, mk);
                                    const plan = getPlanned(c, r);
                                    return '<td class="r"><input type="number" step="0.01" min="0" value="' + (val || '') + '" placeholder="' + fmt.num(plan) + '" ' +
                                        'style="width:70px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;text-align:right;outline:none;transition:border-color 0.15s" ' +
                                        'onfocus="this.style.borderColor=\'var(--primary)\'" ' +
                                        'onblur="this.style.borderColor=\'var(--border)\';saveTimeEntry(' + c.id + ',\'' + r + '\',this.value)" ' +
                                        'onkeydown="if(event.key===\'Enter\'){this.blur();focusNextInput(this)}" ' +
                                        '></td>';
                                }).join('') +
                                '<td class="r"><strong>' + (hasAct ? fmt.hrs(actual) : '-') + '</strong></td>' +
                                '<td class="r" style="color:var(--text-3)">' + fmt.hrs(planned) + '</td>' +
                                '<td class="r">' + (hasAct ? devHtml(dev, planned) : '-') + '</td>' +
                                '</tr>';
                        }).join('')}
                    </tbody>
                </table>
            </div>
        </div>`;
    });

    if (!anyRendered) {
        html += emptyStateHtml({ title: 'Nenhum cliente encontrado', desc: 'Ajuste a busca ou o filtro de squad.' });
    }

    // Log of recent entries
    const entries = [];
    if (DATA.actuals[mk]) {
        Object.entries(DATA.actuals[mk]).forEach(([cid, roles]) => {
            const c = DATA.clients.find(x => x.id === parseInt(cid));
            if (!c) return;
            Object.entries(roles).forEach(([role, val]) => {
                if (val > 0) entries.push({ client: c.name, role, hours: val });
            });
        });
    }

    if (entries.length) {
        html += `
        <div class="table-container">
            <div class="table-header"><h3>Horas Lancadas em ${monthLabel()}</h3><span style="font-size:12px;color:var(--text-2)">${entries.length} lancamentos</span></div>
            <div class="table-wrapper"><table><thead><tr><th>Cliente</th><th>Funcao</th><th class="r">Horas</th></tr></thead><tbody>
            ${entries.map(e => '<tr><td>' + e.client + '</td><td>' + e.role + '</td><td class="r">' + fmt.hrs(e.hours) + 'h</td></tr>').join('')}
            </tbody></table></div>
        </div>`;
    }

    document.getElementById('timeentry-content').innerHTML = html;
}

function saveTimeEntry(clientId, role, value) {
    const val = parseFloat(value) || 0;
    setActual(clientId, role, val);
    // Re-render totals without losing focus position
    renderTimeEntryTotals();
}

function renderTimeEntryTotals() {
    // Light re-render: just update the totals/desvio cells without rebuilding inputs
    const mk = monthKey();
    document.querySelectorAll('#timeentry-content table tbody tr').forEach(tr => {
        // Skip if it's not a client row
        const cells = tr.querySelectorAll('td');
        if (cells.length < ROLES.length + 4) return;
        const nameCell = cells[0]?.querySelector('strong');
        if (!nameCell) return;
        const clientName = nameCell.textContent;
        const c = DATA.clients.find(x => x.name === clientName);
        if (!c) return;

        const actual = clientTotalActual(c, mk);
        const planned = clientTotalPlanned(c);
        const hasAct = hasActuals(c, mk);
        const dev = hasAct ? actual - planned : 0;

        const totalIdx = ROLES.length + 1;
        cells[totalIdx].innerHTML = '<strong>' + (hasAct ? fmt.hrs(actual) : '-') + '</strong>';
        cells[totalIdx + 1].innerHTML = fmt.hrs(planned);
        cells[totalIdx + 2].innerHTML = hasAct ? devHtml(dev, planned) : '-';
    });
}

function focusNextInput(current) {
    const inputs = Array.from(document.querySelectorAll('#timeentry-content input[type="number"]'));
    const idx = inputs.indexOf(current);
    if (idx >= 0 && idx < inputs.length - 1) {
        inputs[idx + 1].focus();
        inputs[idx + 1].select();
    }
}

    if (!DATA.clients || DATA.clients.length === 0) {

function buildPricingTable(cls, mk) {
    const h = DATA.healthyMargin;
    const hPct = (h*100).toFixed(0) + '%';
    const defasados = cls.filter(c => {
        const csp = clientCSP(c, mk);
        return csp > 0 && c.fee < csp / (1 - h);
    });
    if (!defasados.length) {
        return '<div class="table-container"><div class="table-header"><h3>Analise de Pricing</h3></div><div style="padding:32px;text-align:center;color:var(--green-text);font-size:14px">Todos os clientes estao com fee saudavel para margem de ' + hPct + '.</div></div>';
    }
    const defTotalCSP = defasados.reduce((s,c) => s + clientCSP(c,mk), 0);
    const defTotalFee = defasados.reduce((s,c) => s + c.fee, 0);
    const defTotalSugerido = defTotalCSP / (1 - h);
    let rows = defasados.map(c => {
        const csp = clientCSP(c,mk), m = clientMargin(c,mk), hrs = clientTotalHours(c,mk);
        const feeSugerido = csp / (1 - h);
        const reajuste = feeSugerido - c.fee;
        return '<tr>' +
            '<td><strong>' + c.name + '</strong></td>' +
            '<td class="r">' + fmt.hrs(hrs) + 'h</td>' +
            '<td class="r">' + fmt.brl(csp) + '</td>' +
            '<td class="r">' + fmt.brl(c.fee) + '</td>' +
            '<td class="r"><strong>' + fmt.brl(feeSugerido) + '</strong></td>' +
            '<td class="r"><span class="dev-positive">+' + fmt.brl(reajuste) + '</span></td>' +
            '<td class="r"><span class="badge-margin ' + marginClass(m) + '">' + fmt.pct(m) + '</span></td>' +
            '</tr>';
    }).join('');
    rows += '<tr class="total-row">' +
        '<td>TOTAL (' + defasados.length + ' clientes)</td>' +
        '<td class="r"></td>' +
        '<td class="r">' + fmt.brl(defTotalCSP) + '</td>' +
        '<td class="r">' + fmt.brl(defTotalFee) + '</td>' +
        '<td class="r"><strong>' + fmt.brl(defTotalSugerido) + '</strong></td>' +
        '<td class="r"><span class="dev-positive">+' + fmt.brl(defTotalSugerido - defTotalFee) + '</span></td>' +
        '<td></td></tr>';
    return '<div class="table-container">' +
        '<div class="table-header"><h3>Clientes Defasados - Precisam de Reajuste</h3><span style="font-size:12px;color:var(--red)">' + defasados.length + ' cliente' + (defasados.length>1?'s':'') + ' com fee abaixo do ideal para ' + hPct + ' de margem</span></div>' +
        '<div class="table-wrapper"><table><thead><tr><th>Cliente</th><th class="r">Horas</th><th class="r">CSP Total</th><th class="r">Fee Atual</th><th class="r">Fee Sugerido (' + hPct + ')</th><th class="r">Reajuste Necessario</th><th class="r">Margem Atual</th></tr></thead><tbody>' +
        rows + '</tbody></table></div></div>';
}

let clientsFilter = { search: '', status: 'all' };

}

// Team inline editing
function startEditTeamField(td, teamId, field) {
    if (editingCell) return;
    editingCell = td;
    const t = DATA.team.find(x => x.id === teamId);
    const val = field === 'salary' ? t.salary : t.name;
    const type = field === 'salary' ? 'number' : 'text';
    const style = field === 'salary' ? 'width:120px;text-align:right' : 'width:220px';
    td.innerHTML = `<input type="${type}" ${field==='salary'?'step="0.01" min="0"':''} value="${val}" style="${style}" onblur="finishEditTeamField(this,${teamId},'${field}')" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.dataset.cancel='1';this.blur()}">`;
    td.querySelector('input').focus();
    td.querySelector('input').select();
}

function finishEditTeamField(input, teamId, field) {
    if (input.dataset.cancel === '1') { editingCell = null; render(); return; }
    const t = DATA.team.find(x => x.id === teamId);
    if (field === 'salary') t.salary = parseFloat(input.value) || 0;
    else t.name = input.value;
    saveData(); editingCell = null; render();
    toast(field === 'salary' ? 'Remuneracao atualizada!' : 'Nome atualizado!');

                    <div class="form-group"><label>&nbsp;</label><div></div></div>
                </div>
                <h4 style="margin:20px 0 12px;font-size:14px;color:var(--text-2)">Horas Planejadas por Funcao</h4>
                <div class="form-row">${ROLES.map(r=>`<div class="form-group"><label>${r}</label><input type="number" step="0.01" min="0" id="f-h-${r.replace(/[\/\s]/g,'_')}" value="${c?getPlanned(c,r):0}"></div>`).join('')}</div>
                <div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Cancelar</button><button type="submit" class="btn btn-primary">${c?'Salvar':'Criar'}</button></div>
            </form>`;
    } else if (type==='add-squad' || type==='edit-squad') {
        const sq = type==='edit-squad' ? DATA.squads.find(s=>s.id===id) : null;
        modal.innerHTML = `
            <h3>${sq?'Editar Squad':'Novo Squad'}</h3>
            <form onsubmit="saveSquad(event,${sq?sq.id:'null'})">
                <div class="form-row"><div class="form-group"><label>Nome</label><input type="text" id="f-sname" required value="${sq?sq.name:''}"></div><div class="form-group"><label>Horas/pessoa/mes</label><input type="number" id="f-cap" required value="${sq?sq.capacity:180}"></div></div>
                <h4 style="margin:20px 0 12px;font-size:14px;color:var(--text-2)">Membros e Custo/Hora</h4>
                ${ROLES.map(r=>{const m=sq?sq.members.find(x=>x.role===r):null; return `<div class="form-row" style="margin-bottom:8px"><div class="form-group"><label>${r} - Nome</label><input type="text" id="f-m-${r.replace(/[\/\s]/g,'_')}" value="${m?m.name:''}"></div><div class="form-group"><label>${r} - R$/hora</label><input type="number" step="0.01" id="f-c-${r.replace(/[\/\s]/g,'_')}" value="${m?m.costPerHour:0}"></div></div>`;}).join('')}
                <div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Cancelar</button><button type="submit" class="btn btn-primary">${sq?'Salvar':'Criar'}</button></div>
            </form>`;
    } else if (type==='add-team') {
        const allRoles = [...new Set([...ROLES, 'Closer', 'Analista financeiro'])];
        modal.innerHTML = `
            <h3>Novo Colaborador</h3>
            <form onsubmit="saveTeamMember(event)">
                <div class="form-group"><label>Nome Completo</label><input type="text" id="f-tname" required></div>
                <div class="form-row">
                    <div class="form-group"><label>Funcao</label><select id="f-trole" required>${allRoles.map(r=>`<option value="${r}">${r}</option>`).join('')}</select></div>
                    <div class="form-group"><label>Senioridade</label><select id="f-tsen">${SENIORITY.map(s=>`<option value="${s}">${s||'(nenhum)'}</option>`).join('')}</select></div>
                </div>
                <div class="form-group"><label>Remuneracao Mensal (R$)</label><input type="number" step="0.01" min="0" id="f-tsal" required></div>
                <div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Cancelar</button><button type="submit" class="btn btn-primary">Cadastrar</button></div>
            </form>`;
    }
    overlay.classList.add('active');
}

function saveTeamMember(e) {
    e.preventDefault();
    const name = document.getElementById('f-tname').value;
    const role = document.getElementById('f-trole').value;
    const seniority = document.getElementById('f-tsen').value;
    const salary = parseFloat(document.getElementById('f-tsal').value) || 0;
    DATA.team.push({ id: DATA.nextTeamId++, name, role, seniority, salary });
    saveData(); closeModal(); render();
    toast('Colaborador cadastrado!');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

function saveClient(e, id) {
    e.preventDefault();
    const name = document.getElementById('f-name').value;
    const squadId = parseInt(document.getElementById('f-squad').value);
    const fee = parseFloat(document.getElementById('f-fee').value) || 0;
    const status = document.getElementById('f-status').value;
    const planned = {};
    ROLES.forEach(r => { planned[r] = parseFloat(document.getElementById(`f-h-${r.replace(/[\/\s]/g,'_')}`).value) || 0; });

    if (id) {
        const c = DATA.clients.find(x=>x.id===id);
        Object.assign(c, { name, squadId, fee, status, planned });
        toast('Cliente atualizado!');
    } else {
        DATA.clients.push({ id: DATA.nextClientId++, squadId, name, fee, status, planned });
        toast('Cliente criado!');
    }
    saveData(); closeModal(); render();
}

function saveSquad(e, id) {
    e.preventDefault();
    const name = document.getElementById('f-sname').value;
    const capacity = parseInt(document.getElementById('f-cap').value) || 180;
    const members = ROLES.map(r => ({ role:r, name: document.getElementById(`f-m-${r.replace(/[\/\s]/g,'_')}`).value || '', costPerHour: parseFloat(document.getElementById(`f-c-${r.replace(/[\/\s]/g,'_')}`).value) || 0 }));

    if (id) {
        const sq = DATA.squads.find(s=>s.id===id);
        Object.assign(sq, { name, capacity, members });
        toast('Squad atualizado!');
    } else {
        const newId = DATA.nextSquadId++;
        DATA.squads.push({ id:newId, name, capacity, members });
        selectedSquadId = newId;
        toast('Squad criado!');
    }
    saveData(); closeModal(); render();
}

function deleteClient(id) {
    const c = DATA.clients.find(x=>x.id===id);
    if (confirm(`Excluir "${c.name}"?`)) {
        DATA.clients = DATA.clients.filter(x=>x.id!==id);
        saveData(); render(); toast('Cliente excluido');
    }
}

function deleteSquad(id) {
    const sq = DATA.squads.find(s=>s.id===id);
    if (squadClients(id).length) { alert(`Remova os clientes de "${sq.name}" antes de excluir.`); return; }
    if (confirm(`Excluir "${sq.name}"?`)) {
        DATA.squads = DATA.squads.filter(s=>s.id!==id);
        if (selectedSquadId===id) selectedSquadId = DATA.squads[0]?.id||null;
        saveData(); render(); toast('Squad excluido');
    }
}

// ==================== EXPORT ====================
function exportData() {
    const mk = monthKey();
    let csv = 'Squad,Cliente,Fee,Status,';
    csv += ROLES.map(r=>`Plan ${r}`).join(',') + ',Total Plan,';
    csv += ROLES.map(r=>`Real ${r}`).join(',') + ',Total Real,Desvio,CSP Total,Margem\n';
    DATA.clients.forEach(c => {
        const sq = DATA.squads.find(s=>s.id===c.squadId);
        csv += `"${sq?.name||''}","${c.name}",${c.fee},${c.status},`;
        csv += ROLES.map(r=>getPlanned(c,r)).join(',') + `,${clientTotalPlanned(c)},`;
        csv += ROLES.map(r=>getActual(c,r,mk)).join(',') + `,${clientTotalActual(c,mk)},${totalDeviation(c)},${clientCSP(c,mk).toFixed(2)},${(clientMargin(c,mk)*100).toFixed(1)}%\n`;
    });
    const blob = new Blob([csv],{type:'text/csv'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download = `squad-export-${monthKey()}.csv`; a.click();
    toast('Exportado!');
}

// ==================== AUTH ====================
async function hashPassword(pw) {
    const data = new TextEncoder().encode(pw + '_squadmanager_salt');
    const buf = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function attemptLogin(e) {
    e.preventDefault();
    const pw = document.getElementById('login-password').value;
    const err = document.getElementById('login-error');
    if (!pw) { err.textContent='Digite a senha'; return; }
    const hash = await hashPassword(pw);
    let stored = localStorage.getItem('squad-manager-pw-hash');
    if (!stored) { stored = await hashPassword('squad2026'); localStorage.setItem('squad-manager-pw-hash', stored); }
    if (hash === stored) { sessionStorage.setItem('squad-auth','true'); document.getElementById('login-screen').classList.add('hidden'); err.textContent=''; }
    else { err.textContent='Senha incorreta.'; document.getElementById('login-password').value=''; document.getElementById('login-password').focus(); }
}

function logout() { sessionStorage.removeItem('squad-auth'); document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('login-password').value=''; }

function checkAuth() { if (sessionStorage.getItem('squad-auth')==='true') document.getElementById('login-screen').classList.add('hidden'); }

async function changePassword() {
    const cur = prompt('Senha atual:'); if (!cur) return;
    const curH = await hashPassword(cur);
    if (curH !== localStorage.getItem('squad-manager-pw-hash')) { alert('Senha incorreta.'); return; }
    const np = prompt('Nova senha (min 4 chars):'); if (!np||np.length<4) { alert('Senha muito curta.'); return; }
    const cp = prompt('Confirme:'); if (np!==cp) { alert('Senhas nao coincidem.'); return; }
    localStorage.setItem('squad-manager-pw-hash', await hashPassword(np));
    toast('Senha alterada!');
}

// ==================== TOAST ====================
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3000); }

// ==================== INIT ====================
initMonth();
loadData();
checkAuth();
showView('dashboard');
</script>
