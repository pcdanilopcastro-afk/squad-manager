<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Manager - Gestão Operacional & Financeira</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --sidebar-w: 260px;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-2: #f8f9fa;
            --border: #e2e8f0;
            --text: #1a202c;
            --text-2: #64748b;
            --text-3: #94a3b8;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #dbeafe;
            --green: #22c55e;
            --green-bg: #dcfce7;
            --green-text: #166534;
            --yellow: #eab308;
            --yellow-bg: #fef9c3;
            --yellow-text: #854d0e;
            --red: #ef4444;
            --red-bg: #fee2e2;
            --red-text: #991b1b;
            --sidebar-bg: #0f172a;
            --sidebar-text: #cbd5e1;
            --sidebar-active: #1e293b;
            --sidebar-hover: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .sidebar-brand h1 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .sidebar-brand p {
            font-size: 11px;
            color: var(--text-3);
            margin-top: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sidebar-nav {
            padding: 16px 12px;
            flex: 1;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-3);
            padding: 0 8px;
            margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 14px;
            color: var(--sidebar-text);
            margin-bottom: 2px;
        }

        .nav-item:hover { background: var(--sidebar-hover); }
        .nav-item.active {
            background: var(--primary);
            color: #fff;
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .nav-item .badge {
            margin-left: auto;
            background: var(--red);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
        }

        /* Main Content */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            min-height: 100vh;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .topbar-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .content {
            padding: 32px;
        }

        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-card .change {
            font-size: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-card .change.positive { color: var(--green-text); }
        .stat-card .change.negative { color: var(--red-text); }

        /* Tables */
        .table-container {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .table-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead th {
            background: var(--surface-2);
            padding: 10px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-2);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            position: sticky;
            top: 0;
        }

        thead th.right { text-align: right; }
        thead th.center { text-align: center; }

        tbody td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tbody td.right { text-align: right; }
        tbody td.center { text-align: center; }

        tbody tr:hover { background: var(--surface-2); }

        tbody tr.total-row {
            background: var(--surface-2);
            font-weight: 700;
        }

        tbody tr.total-row td {
            border-top: 2px solid var(--border);
        }

        tbody tr.percent-row {
            background: var(--surface-2);
        }

        tbody tr.percent-row td {
            font-size: 11px;
            color: var(--text-2);
        }

        /* Editable cells */
        .editable {
            cursor: text;
            position: relative;
            min-width: 60px;
        }

        .editable:hover {
            background: var(--primary-light);
            border-radius: 4px;
        }

        .editable input {
            width: 70px;
            padding: 4px 8px;
            border: 2px solid var(--primary);
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
            text-align: right;
            outline: none;
            background: #fff;
        }

        .editable-fee input {
            width: 110px;
        }

        /* Badges */
        .margin-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .margin-badge.green { background: var(--green-bg); color: var(--green-text); }
        .margin-badge.yellow { background: var(--yellow-bg); color: var(--yellow-text); }
        .margin-badge.red { background: var(--red-bg); color: var(--red-text); }

        /* Capacity Bar */
        .capacity-bar-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .capacity-bar {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .capacity-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .capacity-bar-fill.green { background: var(--green); }
        .capacity-bar-fill.yellow { background: var(--yellow); }
        .capacity-bar-fill.red { background: var(--red); }

        .capacity-label {
            font-size: 12px;
            font-weight: 600;
            min-width: 45px;
            text-align: right;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .btn:hover { background: var(--surface-2); }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-primary:hover { background: var(--primary-dark); }

        .btn-danger {
            color: var(--red);
            border-color: var(--red);
        }

        .btn-danger:hover { background: var(--red-bg); }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        /* Alerts */
        .alerts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .alert-item {
            padding: 14px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
        }

        .alert-item.warning {
            background: var(--yellow-bg);
            color: var(--yellow-text);
            border: 1px solid #fde68a;
        }

        .alert-item.danger {
            background: var(--red-bg);
            color: var(--red-text);
            border: 1px solid #fecaca;
        }

        .alert-item.info {
            background: var(--primary-light);
            color: var(--primary-dark);
            border: 1px solid #93c5fd;
        }

        .alert-icon { font-size: 18px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h3 {
            font-size: 18px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        /* Squad selector tabs */
        .squad-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .squad-tab {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }

        .squad-tab:hover { border-color: var(--primary); color: var(--primary); }
        .squad-tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* Squad info bar */
        .squad-info-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .squad-info-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            min-width: 180px;
        }

        .squad-info-item .label {
            font-size: 11px;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .squad-info-item .value {
            font-size: 22px;
            font-weight: 700;
            margin-top: 4px;
        }

        /* Members list */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .member-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
        }

        .member-chip .role {
            font-size: 10px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .member-chip .name {
            font-weight: 600;
            margin-top: 2px;
        }

        .member-chip .cost {
            color: var(--text-2);
            margin-top: 2px;
        }

        /* Dashboard grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .dashboard-grid .full-width {
            grid-column: 1 / -1;
        }

        /* View toggler */
        .view-page { display: none; }
        .view-page.active { display: block; }

        /* Login Screen */
        .login-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-screen.hidden { display: none; }

        .login-box {
            background: var(--surface);
            border-radius: 20px;
            padding: 48px 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-box .login-icon {
            width: 64px;
            height: 64px;
            background: var(--primary-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .login-box .login-icon svg {
            width: 32px;
            height: 32px;
            stroke: var(--primary);
        }

        .login-box h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .login-box p {
            font-size: 14px;
            color: var(--text-2);
            margin-bottom: 32px;
        }

        .login-box .login-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }

        .login-box .login-input:focus {
            border-color: var(--primary);
        }

        .login-box .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-box .login-btn:hover {
            background: var(--primary-dark);
        }

        .login-box .login-error {
            color: var(--red);
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        .login-box .login-footer {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-3);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { width: 60px; }
            .sidebar .sidebar-brand p,
            .sidebar .nav-section-title,
            .sidebar .nav-item span,
            .sidebar .nav-item .badge { display: none; }
            .sidebar .nav-item { justify-content: center; padding: 12px; }
            .main { margin-left: 60px; }
            .content { padding: 20px; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--sidebar-bg);
            color: #fff;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* No data */
        .no-data {
            padding: 60px 24px;
            text-align: center;
            color: var(--text-3);
        }

        .no-data svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="login-screen">
    <div class="login-box">
        <div class="login-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <h2>Squad Manager</h2>
        <p>Acesso restrito. Digite a senha para continuar.</p>
        <form onsubmit="attemptLogin(event)">
            <input type="password" class="login-input" id="login-password" placeholder="Senha de acesso" autofocus>
            <button type="submit" class="login-btn">Entrar</button>
        </form>
        <div class="login-error" id="login-error"></div>
        <div class="login-footer">Acesso protegido por senha</div>
    </div>
</div>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>SquadManager</h1>
        <p>Gestao Operacional</p>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">
            <div class="nav-section-title">Principal</div>
            <div class="nav-item active" onclick="showView('dashboard')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
            </div>
            <div class="nav-item" onclick="showView('squads')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                <span>Squads</span>
            </div>
            <div class="nav-item" onclick="showView('financial')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                <span>Financeiro</span>
            </div>
            <div class="nav-item" onclick="showView('clients')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Clientes</span>
            </div>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">Configuracao</div>
            <div class="nav-item" onclick="showView('settings')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Configuracoes</span>
            </div>
        </div>
    </nav>
</aside>

<!-- Main Content -->
<div class="main">
    <div class="topbar">
        <h2 id="page-title">Dashboard</h2>
        <div class="topbar-actions">
            <button class="btn" onclick="exportData()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Exportar
            </button>
            <button class="btn btn-primary" onclick="openModal('add-client')">
                + Novo Cliente
            </button>
            <button class="btn btn-danger" onclick="logout()" title="Sair">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sair
            </button>
        </div>
    </div>

    <div class="content">
        <!-- DASHBOARD VIEW -->
        <div class="view-page active" id="view-dashboard">
            <div id="alerts-container"></div>
            <div class="stats-grid" id="dashboard-stats"></div>
            <div class="dashboard-grid">
                <div class="table-container full-width" id="dashboard-squads-overview"></div>
                <div class="table-container" id="dashboard-top-margin"></div>
                <div class="table-container" id="dashboard-low-margin"></div>
            </div>
        </div>

        <!-- SQUADS VIEW -->

let DATA;

function loadData() {
    const saved = localStorage.getItem('squad-manager-data');
    DATA = saved ? JSON.parse(saved) : getDefaultData();
}

function saveData() {
    localStorage.setItem('squad-manager-data', JSON.stringify(DATA));
}

// ==================== CALCULATIONS ====================
function getCostPerHour(squadId, role) {
    const squad = DATA.squads.find(s => s.id === squadId);
    if (!squad) return 0;
    const member = squad.members.find(m => m.role === role);
    return member ? member.costPerHour : 0;
}

function getClientCSPByRole(client, role) {
    return (client.hours[role] || 0) * getCostPerHour(client.squadId, role);
}

function getClientCSPTotal(client) {
    return ROLES.reduce((sum, role) => sum + getClientCSPByRole(client, role), 0);
}

function getClientTotalHours(client) {
    return ROLES.reduce((sum, role) => sum + (client.hours[role] || 0), 0);
}

function getClientMargin(client) {
    if (client.fee === 0) return 0;
    const csp = getClientCSPTotal(client);
    return (client.fee - csp) / client.fee;
}

function getMarginClass(margin) {
    if (margin > 0.5) return 'green';
    if (margin >= 0.3) return 'yellow';
    return 'red';
}

function getSquadClients(squadId) {
    return DATA.clients.filter(c => c.squadId === squadId);
}

function getSquadTotalHoursByRole(squadId, role) {
    return getSquadClients(squadId).reduce((sum, c) => sum + (c.hours[role] || 0), 0);
}

function getSquadTotalHours(squadId) {
    return getSquadClients(squadId).reduce((sum, c) => sum + getClientTotalHours(c), 0);
}

function getSquadUtilization(squadId) {
    const squad = DATA.squads.find(s => s.id === squadId);
    if (!squad || squad.capacity === 0) return 0;
    return getSquadTotalHours(squadId) / squad.capacity;
}

function getSquadTotalFee(squadId) {
    return getSquadClients(squadId).reduce((sum, c) => sum + c.fee, 0);
}

function getSquadTotalCSP(squadId) {
    return getSquadClients(squadId).reduce((sum, c) => sum + getClientCSPTotal(c), 0);
}

function getAllAlerts() {
    const alerts = [];
    DATA.squads.forEach(squad => {
        const util = getSquadUtilization(squad.id);
        if (util > 1) {
            alerts.push({ type: 'danger', msg: `${squad.name} esta SOBRECARREGADO (${fmt.pct(util)} de ocupacao)` });
        } else if (util > 0.85) {
            alerts.push({ type: 'warning', msg: `${squad.name} esta com alta ocupacao (${fmt.pct(util)})` });
        }
    });
    DATA.clients.forEach(client => {
        const margin = getClientMargin(client);
        if (margin < 0) {
            alerts.push({ type: 'danger', msg: `${client.name} tem margem NEGATIVA (${fmt.pct(margin)})` });
        } else if (margin < 0.3 && client.fee > 0) {
            alerts.push({ type: 'warning', msg: `${client.name} esta com margem baixa (${fmt.pct(margin)})` });
        }
    });
    return alerts;
}

// ==================== FORMATTERS ====================
const fmt = {
    brl: (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }),
    pct: (v) => (v * 100).toFixed(1) + '%',
    num: (v) => typeof v === 'number' ? (Number.isInteger(v) ? v.toString() : v.toFixed(2)) : '0',
    hrs: (v) => v.toFixed(2)
};

}

                                <td class="right">${fmt.brl(c.fee)}</td>

                                <td class="right">${fmt.brl(csp)}</td>
                                <td class="right"><span class="margin-badge ${getMarginClass(margin)}">${fmt.pct(margin)}</span></td>
                                <td class="center">
                                    <button class="btn btn-sm" onclick="openModal('edit-client', ${c.id})">Editar</button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteClient(${c.id})">Excluir</button>
                                </td>
                            </tr>`;
                        }).join('')}

    `;
    document.getElementById('clients-list').innerHTML = html;
}

// ==================== SQUAD TABS ====================
function renderSquadTabs(containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = DATA.squads.map(s => `
        <button class="squad-tab ${s.id === selectedSquadId ? 'active' : ''}" onclick="selectSquad(${s.id})">${s.name}</button>

function selectSquad(id) {
    selectedSquadId = id;

// ==================== INLINE EDITING ====================
function startEdit(td, clientId, role) {
    if (editingCell) return;
    editingCell = td;
    const client = DATA.clients.find(c => c.id === clientId);
    const val = client.hours[role] || 0;
    const original = td.textContent;
    td.innerHTML = `<input type="number" step="0.01" min="0" value="${val}"
        onblur="finishEdit(this, ${clientId}, '${role}')"
        onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.dataset.cancel='1';this.blur()}"
        >`;
    td.querySelector('input').focus();
    td.querySelector('input').select();
    td.querySelector('input').dataset.original = original;
}

function finishEdit(input, clientId, role) {
    if (input.dataset.cancel === '1') {
        editingCell.textContent = input.dataset.original;
        editingCell = null;
        return;
    }
    const val = parseFloat(input.value) || 0;
    const client = DATA.clients.find(c => c.id === clientId);
    client.hours[role] = val;
    saveData();
    editingCell = null;
    render();
}

function startEditFee(td, clientId) {
    if (editingCell) return;
    editingCell = td;
    const client = DATA.clients.find(c => c.id === clientId);
    const original = td.textContent;
    td.innerHTML = `<input type="number" step="0.01" min="0" value="${client.fee}"
        onblur="finishEditFee(this, ${clientId})"
        onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.dataset.cancel='1';this.blur()}"
        >`;
    td.querySelector('input').focus();
    td.querySelector('input').select();
    td.querySelector('input').dataset.original = original;
}

function finishEditFee(input, clientId) {
    if (input.dataset.cancel === '1') {
        editingCell.textContent = input.dataset.original;
        editingCell = null;
        return;
    }
    const val = parseFloat(input.value) || 0;
    const client = DATA.clients.find(c => c.id === clientId);
    client.fee = val;
    saveData();
    editingCell = null;
    render();
}

// ==================== MODALS ====================
function openModal(type, id) {
    const modal = document.getElementById('modal-content');
    const overlay = document.getElementById('modal-overlay');

    if (type === 'add-client' || type === 'edit-client') {
        const client = type === 'edit-client' ? DATA.clients.find(c => c.id === id) : null;
        modal.innerHTML = `
            <h3>${client ? 'Editar Cliente' : 'Novo Cliente'}</h3>
            <form onsubmit="saveClient(event, ${client ? client.id : 'null'})">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nome do Cliente</label>
                        <input type="text" id="f-name" required value="${client ? client.name : ''}">
                    </div>
                    <div class="form-group">
                        <label>Squad</label>
                        <select id="f-squad" required>
                            ${DATA.squads.map(s => `<option value="${s.id}" ${client && client.squadId === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Fee Mensal (R$)</label>
                    <input type="number" step="0.01" id="f-fee" required value="${client ? client.fee : ''}">
                </div>
                <h4 style="margin:20px 0 12px;font-size:14px;color:var(--text-2)">Horas por Funcao</h4>
                <div class="form-row">
                    ${ROLES.map(r => `
                        <div class="form-group">
                            <label>${r}</label>
                            <input type="number" step="0.01" min="0" id="f-h-${r.replace(/[\/\s]/g,'_')}" value="${client ? (client.hours[r] || 0) : 0}">
                        </div>
                    `).join('')}
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">${client ? 'Salvar' : 'Criar Cliente'}</button>
                </div>
            </form>
        `;
    } else if (type === 'add-squad' || type === 'edit-squad') {
        const squad = type === 'edit-squad' ? DATA.squads.find(s => s.id === id) : null;
        modal.innerHTML = `
            <h3>${squad ? 'Editar Squad' : 'Novo Squad'}</h3>
            <form onsubmit="saveSquad(event, ${squad ? squad.id : 'null'})">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nome do Squad</label>
                        <input type="text" id="f-sname" required value="${squad ? squad.name : ''}">
                    </div>
                    <div class="form-group">
                        <label>Capacidade (horas/mes)</label>
                        <input type="number" id="f-cap" required value="${squad ? squad.capacity : 180}">
                    </div>
                </div>
                <h4 style="margin:20px 0 12px;font-size:14px;color:var(--text-2)">Membros e Custo/Hora</h4>
                ${ROLES.map(r => {
                    const m = squad ? squad.members.find(x => x.role === r) : null;
                    return `
                        <div class="form-row" style="margin-bottom:8px">
                            <div class="form-group">
                                <label>${r} - Nome</label>
                                <input type="text" id="f-m-${r.replace(/[\/\s]/g,'_')}" value="${m ? m.name : ''}">
                            </div>
                            <div class="form-group">
                                <label>${r} - R$/hora</label>
                                <input type="number" step="0.01" id="f-c-${r.replace(/[\/\s]/g,'_')}" value="${m ? m.costPerHour : 0}">
                            </div>
                        </div>
                    `;
                }).join('')}
                <div class="modal-actions">
                    <button type="button" class="btn" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">${squad ? 'Salvar' : 'Criar Squad'}</button>
                </div>
            </form>
        `;
    }

    overlay.classList.add('active');
}

function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
}

function saveClient(e, id) {
    e.preventDefault();
    const name = document.getElementById('f-name').value;
    const squadId = parseInt(document.getElementById('f-squad').value);
    const fee = parseFloat(document.getElementById('f-fee').value) || 0;
    const hours = {};
    ROLES.forEach(r => {
        hours[r] = parseFloat(document.getElementById(`f-h-${r.replace(/[\/\s]/g,'_')}`).value) || 0;
    });

    if (id) {
        const client = DATA.clients.find(c => c.id === id);
        client.name = name;
        client.squadId = squadId;
        client.fee = fee;
        client.hours = hours;
        toast('Cliente atualizado!');
    } else {
        DATA.clients.push({ id: DATA.nextClientId++, squadId, name, fee, hours });
        toast('Cliente criado!');
    }

    saveData();
    closeModal();
    render();
}

function saveSquad(e, id) {
    e.preventDefault();
    const name = document.getElementById('f-sname').value;
    const capacity = parseInt(document.getElementById('f-cap').value) || 180;
    const members = ROLES.map(r => ({
        role: r,
        name: document.getElementById(`f-m-${r.replace(/[\/\s]/g,'_')}`).value || '',
        costPerHour: parseFloat(document.getElementById(`f-c-${r.replace(/[\/\s]/g,'_')}`).value) || 0
    }));

    if (id) {
        const squad = DATA.squads.find(s => s.id === id);
        squad.name = name;
        squad.capacity = capacity;
        squad.members = members;
        toast('Squad atualizado!');
    } else {
        const newId = DATA.nextSquadId++;
        DATA.squads.push({ id: newId, name, capacity, members });
        selectedSquadId = newId;
        toast('Squad criado!');
    }

    saveData();
    closeModal();
    render();
}

function deleteClient(id) {
    const client = DATA.clients.find(c => c.id === id);
    if (confirm(`Excluir o cliente "${client.name}"?`)) {
        DATA.clients = DATA.clients.filter(c => c.id !== id);
        saveData();
        render();
        toast('Cliente excluido');
    }
}

function deleteSquad(id) {
    const squad = DATA.squads.find(s => s.id === id);
    const clients = getSquadClients(id);
    if (clients.length > 0) {
        alert(`Nao e possivel excluir "${squad.name}" pois possui ${clients.length} cliente(s). Remova os clientes primeiro.`);
        return;
    }
    if (confirm(`Excluir "${squad.name}"?`)) {
        DATA.squads = DATA.squads.filter(s => s.id !== id);
        if (selectedSquadId === id) selectedSquadId = DATA.squads[0]?.id || null;
        saveData();
        render();
        toast('Squad excluido');
    }
}

// ==================== EXPORT ====================
function exportData() {
    let csv = 'Squad,Cliente,Fee,';
    csv += ROLES.map(r => `Horas ${r}`).join(',');
    csv += ',Total Horas,CSP Total,Margem\n';

    DATA.clients.forEach(c => {
        const squad = DATA.squads.find(s => s.id === c.squadId);
        csv += `"${squad?.name || ''}","${c.name}",${c.fee},`;
        csv += ROLES.map(r => c.hours[r] || 0).join(',');
        csv += `,${getClientTotalHours(c)},${getClientCSPTotal(c).toFixed(2)},${(getClientMargin(c)*100).toFixed(1)}%\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `squad-manager-export-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Dados exportados!');
}

// ==================== TOAST ====================
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
}

// ==================== AUTH ====================
// Senha padrao: "squad2026" — para trocar, use a tela de configuracoes
const DEFAULT_HASH = '9f0c5e123b6d4e8a7c2d1f0e3b5a8c7d6e9f2a1b4c7d0e3f6a9b2c5d8e1f4a7'; // placeholder

async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password + '_squadmanager_salt');
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function attemptLogin(e) {
    e.preventDefault();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');

    if (!password) {
        errorEl.textContent = 'Digite a senha';
        return;
    }

    const hash = await hashPassword(password);
    const storedHash = localStorage.getItem('squad-manager-pw-hash');

    // Se nao tem senha cadastrada, a senha padrao e "squad2026"
    if (!storedHash) {
        const defaultHash = await hashPassword('squad2026');
        if (hash === defaultHash) {
            localStorage.setItem('squad-manager-pw-hash', defaultHash);
            sessionStorage.setItem('squad-auth', 'true');
            document.getElementById('login-screen').classList.add('hidden');
            errorEl.textContent = '';
            return;
        }
    } else if (hash === storedHash) {
        sessionStorage.setItem('squad-auth', 'true');
        document.getElementById('login-screen').classList.add('hidden');
        errorEl.textContent = '';
        return;
    }

    errorEl.textContent = 'Senha incorreta. Tente novamente.';
    document.getElementById('login-password').value = '';
    document.getElementById('login-password').focus();
}

function logout() {
    sessionStorage.removeItem('squad-auth');
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').textContent = '';
}

function checkAuth() {
    if (sessionStorage.getItem('squad-auth') === 'true') {
        document.getElementById('login-screen').classList.add('hidden');
    }
}

async function changePassword() {
    const current = prompt('Digite a senha atual:');
    if (!current) return;

    const currentHash = await hashPassword(current);
    const storedHash = localStorage.getItem('squad-manager-pw-hash');

    if (currentHash !== storedHash) {
        alert('Senha atual incorreta.');
        return;
    }

    const newPw = prompt('Digite a nova senha:');
    if (!newPw || newPw.length < 4) {
        alert('A senha deve ter pelo menos 4 caracteres.');
        return;
    }

    const confirmPw = prompt('Confirme a nova senha:');
    if (newPw !== confirmPw) {
        alert('As senhas nao coincidem.');
        return;
    }

    const newHash = await hashPassword(newPw);
    localStorage.setItem('squad-manager-pw-hash', newHash);
    toast('Senha alterada com sucesso!');
}
